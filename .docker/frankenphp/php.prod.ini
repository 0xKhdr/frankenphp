; ===============================================
; PHP Production Configuration - Optimized for Performance & Security
; ===============================================

[PHP]
; Core Engine Settings
engine = On
short_open_tag = Off
precision = 14
serialize_precision = -1

; Output Buffering - Production Optimized
output_buffering = 16384
zlib.output_compression = On
zlib.output_compression_level = 6
zlib.output_handler =

; Performance Settings
implicit_flush = Off
unserialize_callback_func =
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source
disable_classes =

; Zend Engine Optimizations
zend.enable_gc = On
zend.exception_ignore_args = On
zend.exception_string_param_max_len = 0

; Security - Production Hardened
expose_php = Off

; Execution Limits - Production Optimized
max_execution_time = 60
max_input_time = 60
max_input_vars = 1000
max_input_nesting_level = 64
memory_limit = 512M

; Error Handling - Production Mode
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = On
ignore_repeated_source = On
report_memleaks = Off

; Data Handling
post_max_size = 50M
auto_globals_jit = On
default_mimetype = "text/html"
default_charset = "UTF-8"

; Paths and Directories
include_path = ".:/usr/local/lib/php"
auto_prepend_file =
auto_append_file =
doc_root =
user_dir =
enable_dl = Off

; File Uploads - Production Secured
file_uploads = On
upload_max_filesize = 50M
max_file_uploads = 20
upload_tmp_dir = /tmp

; Fopen wrappers - Security Hardened
allow_url_fopen = Off
allow_url_include = Off
default_socket_timeout = 30
user_agent = "PHP"

; ===============================================
; Date/Time Configuration
; ===============================================
[Date]
date.timezone = UTC

; ===============================================
; Session Configuration - Production Redis
; ===============================================
[Session]
session.save_handler = redis
session.save_path = "tcp://redis:6379?timeout=2&read_timeout=2&retry_interval=100&auth=your_redis_password"
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly = On
session.cookie_secure = On
session.cookie_samesite = Strict
session.serialize_handler = php_serialize
session.gc_probability = 0
session.gc_divisor = 1000
session.gc_maxlifetime = 3600
session.referer_check =
session.cache_limiter = nocache
session.cache_expire = 180
session.use_trans_sid = 0
session.sid_length = 32
session.trans_sid_tags = "a=href,area=href,frame=src,form="
session.sid_bits_per_character = 6

; ===============================================
; Assertion Configuration - Production Disabled
; ===============================================
[Assertion]
zend.assertions = -1
assert.active = Off

; ===============================================
; OpCache Configuration - Production Optimized
; ===============================================
[opcache]
; Enable OpCache
opcache.enable = 1
opcache.enable_cli = 0

; Memory Settings - Production Optimized
opcache.memory_consumption = 1024
opcache.interned_strings_buffer = 128
opcache.max_accelerated_files = 50000

; Validation Settings - Production Mode (No Validation)
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.use_cwd = 1

; Performance Settings - Maximum Optimization
opcache.save_comments = 0
opcache.fast_shutdown = 1
opcache.enable_file_override = 1

; File Cache Settings
opcache.file_cache = /tmp/opcache
opcache.file_cache_only = 0
opcache.file_cache_consistency_checks = 0

; Optimization Settings - Maximum Performance
opcache.optimization_level = 0x7FFEBFFF
opcache.inherited_hack = 1
opcache.dups_fix = 0
opcache.blacklist_filename =

; Preload Settings (enable for Laravel)
opcache.preload = /app/bootstrap/cache/preload.php
opcache.preload_user = www-data

; ===============================================
; Realpath Cache - Maximum Performance
; ===============================================
[realpath]
realpath_cache_size = 16M
realpath_cache_ttl = 3600

; ===============================================
; JIT Configuration - Production Optimized
; ===============================================
[jit]
opcache.jit = 1255
opcache.jit_buffer_size = 512M

; ===============================================
; MySQLi Configuration - Production
; ===============================================
[mysqli]
mysqli.max_persistent = 100
mysqli.allow_persistent = On
mysqli.max_links = 100
mysqli.default_port = 3306
mysqli.default_socket =
mysqli.default_host =
mysqli.default_user =
mysqli.default_pw =
mysqli.reconnect = Off

; ===============================================
; PDO Configuration
; ===============================================
[PDO]
pdo_mysql.default_socket =

; ===============================================
; Curl Configuration
; ===============================================
[curl]
curl.cainfo = /etc/ssl/certs/ca-certificates.crt

; ===============================================
; Mail Configuration - Production
; ===============================================
[mail function]
SMTP = localhost
smtp_port = 25

; ===============================================
; Security Settings - Production Hardened
; ===============================================
[Security]
; Disable dangerous functions
allow_url_fopen = Off
allow_url_include = Off